<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Messiah Baptist Church</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-card h1 {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #d4af37;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #d4af37;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-login:hover {
            background: #c19b2e;
            transform: translateY(-2px);
        }

        #error-message {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Admin Portal</h1>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required autocomplete="current-password">
                    <span class="toggle-password" onclick="togglePassword()">
                        <i class="fa-solid fa-eye-slash"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn-login">SIGN IN</button>
            <p id="error-message">Invalid credentials. Please try again.</p>
        </form>
    </div>

    <script>
        const API_URL = (() => {
            const { hostname, port, protocol } = window.location;
            if (protocol === 'file:') {
                return 'http://localhost:3002/api';
            }
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port !== '3002') {
                return `http://${hostname}:3002/api`;
            }
            return '/api';
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-message');
            errorMsg.style.display = 'none';
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'SIGNING IN...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                if (response.ok) {
                    window.location.href = window.location.protocol === 'file:'
                        ? 'http://localhost:3002/admin.html'
                        : './admin.html';
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.error || 'Invalid credentials. Please try again.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = 'Connection error. Is the server running?';
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password i');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleIcon.className = 'fa-solid fa-eye';
            } else {
                pwdInput.type = 'password';
                toggleIcon.className = 'fa-solid fa-eye-slash';
            }
        }


    </script>
</body>

</html>
